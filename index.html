<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROYUN - Snake Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>🐍 TROYUN - Snake Game</h1>
    
    <div class="info">
        <div>Skor: <span id="score">0</span></div>
        <div>Seviye: <span id="level">1</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button id="startBtn">Başla</button>
        <button id="pauseBtn">Duraklat</button>
        <button id="resetBtn">Sıfırla</button>
    </div>

    <div id="mobileControls">
        <div></div>
        <button id="upBtn">⬆️</button>
        <div></div>
        <button id="leftBtn">⬅️</button>
        <button id="downBtn">⬇️</button>
        <button id="rightBtn">➡️</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
